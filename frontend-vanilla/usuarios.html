<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RutaByte | Gestion de Usuarios</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/sedes.css" />
    <link rel="stylesheet" href="css/usuarios.css" />
    <script src="js/auth-guard.js" defer></script>
    <script src="js/usuarios.js" defer></script>
  </head>
  <body>
    <main class="sedes-page">
      <section class="sedes-shell">
        <header class="sedes-header">
          <div>
            <span class="eyebrow">HU-A02</span>
            <h1>Gestion de Usuarios</h1>
            <p>
              Crea usuarios con rol de Administrador, Cajero o Mesero y
              asignalos a una sede.
            </p>
          </div>
          <div class="actions-row">
            <button id="openModalBtn" class="btn btn-primary" type="button">
              Nuevo Usuario
            </button>
            <a class="btn btn-ghost" href="dashboard.html">Volver</a>
          </div>
        </header>

        <section class="content">
          <div id="alertSlot" class="alert-slot" aria-live="polite"></div>

          <div class="table-wrap">
            <table aria-label="Listado de usuarios">
              <thead>
                <tr>
                  <th>Nombre</th>
                  <th>Correo</th>
                  <th>Rol</th>
                  <th>Sede</th>
                  <th>Estado</th>
                  <th>Acciones</th>
                </tr>
              </thead>
              <tbody id="usuariosTableBody"></tbody>
            </table>
          </div>
        </section>
      </section>
    </main>

    <div id="usuarioModal" class="modal" aria-hidden="true">
      <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="modal-header">
          <div>
            <span class="eyebrow">Nuevo registro</span>
            <h2 id="modalTitle">Crear Usuario</h2>
          </div>
          <button id="closeModalBtn" class="icon-btn" type="button" aria-label="Cerrar modal">
            &times;
          </button>
        </div>

        <form id="usuarioForm">
          <div class="modal-body">
            <div class="field">
              <label for="nombre">Nombre</label>
              <input
                id="nombre"
                name="nombre"
                type="text"
                maxlength="150"
                required
                placeholder="Ej. Juan Perez"
              />
            </div>
            <div class="field">
              <label for="correo">Correo electronico</label>
              <input
                id="correo"
                name="correo"
                type="email"
                maxlength="150"
                required
                placeholder="Ej. juan@rutabyte.local"
              />
            </div>
            <div class="field">
              <label for="contrasena">Contrasena</label>
              <input
                id="contrasena"
                name="contrasena"
                type="password"
                minlength="6"
                maxlength="128"
                required
                placeholder="Minimo 6 caracteres"
              />
            </div>
            <div class="field">
              <label for="rol_id">Rol</label>
              <select id="rol_id" name="rol_id" required>
                <option value="">Seleccionar rol</option>
                <option value="1">ADMIN</option>
                <option value="2">CAJERO</option>
                <option value="3">MESERO</option>
              </select>
            </div>
            <div class="field">
              <label for="sede_id">Sede</label>
              <select id="sede_id" name="sede_id">
                <option value="">Sin sede</option>
              </select>
            </div>
          </div>

          <div class="modal-footer">
            <button id="cancelModalBtn" class="btn btn-ghost" type="button">
              Cancelar
            </button>
            <button class="btn btn-primary" type="submit">Guardar Usuario</button>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
