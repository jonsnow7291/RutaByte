<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RutaByte | Gestión de Categorías</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/sedes.css" />
    <link rel="stylesheet" href="css/usuarios.css" />
    <script src="js/auth-guard.js" defer></script>
    <script src="js/categorias.js" defer></script>
  </head>
  <body>
    <main class="sedes-page">
      <section class="sedes-shell">
        <header class="sedes-header">
          <div>
            <span class="eyebrow">HU-A10</span>
            <h1>Gestión de Categorías</h1>
            <p>
              Organiza la jerarquía del catálogo. Crea, edita y desactiva categorías del menú de productos.
            </p>
          </div>
          <div class="actions-row">
            <button id="openModalBtn" class="btn btn-primary" type="button">
              Nueva Categoría
            </button>
            <a class="btn btn-ghost" href="productos.html">Productos</a>
            <a class="btn btn-ghost" href="dashboard.html">Volver</a>
          </div>
        </header>

        <section class="content">
          <div id="alertSlot" class="alert-slot" aria-live="polite"></div>

          <div class="table-wrap">
            <table aria-label="Listado de categorías">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Nombre de Categoría</th>
                  <th>Estado</th>
                  <th>Acciones</th>
                </tr>
              </thead>
              <tbody id="categoriasTableBody"></tbody>
            </table>
          </div>
        </section>
      </section>
    </main>

    <!-- Modal Categoría -->
    <div id="categoriaModal" class="modal" aria-hidden="true">
      <div class="modal-card modal-card--sm" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="modal-header">
          <div>
            <span class="eyebrow" id="modalEyebrow">Nuevo registro</span>
            <h2 id="modalTitle">Crear Categoría</h2>
          </div>
          <button id="closeModalBtn" class="icon-btn" type="button" aria-label="Cerrar modal">
            &times;
          </button>
        </div>

        <form id="categoriaForm">
          <div class="modal-body">
            <div class="field">
              <label for="nombre">Nombre de la Categoría</label>
              <input id="nombre" name="nombre" type="text" maxlength="100" required placeholder="Ej. Entradas, Postres, Bebidas" />
            </div>
          </div>

          <div class="modal-footer">
            <button id="cancelModalBtn" class="btn btn-ghost" type="button">Cancelar</button>
            <button class="btn btn-primary" type="submit">Guardar Categoría</button>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
